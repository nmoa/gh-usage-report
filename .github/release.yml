changelog:
  categories:
    - title: "🚀 Features"
      labels:
        - "feature"
        - "enhancement"
    - title: "🐛 Bug Fixes"
      labels:
        - "bug"
        - "fix"
    - title: "📖 Documentation"
      labels:
        - "documentation"
    - title: "📦 Dependencies"
      labels:
        - "dependencies"
    - title: "🔧 Maintenance"
      labels:
        - "chore"
        - "refactor"
  exclude:
    labels:
      - "ignore-for-release"
